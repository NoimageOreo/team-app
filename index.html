<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>どーなっつ チーム分けアプリ</title>
<meta property="og:title" content="どーなっつ チーム分けアプリ" />
<meta property="og:description" content="どーなっつ専用チーム分けアプリだよ～" />
<meta property="og:type" content="website" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f3f4f6;min-height:100vh}
input{width:100%;border:2px solid #e5e7eb;border-radius:.75rem;padding:.75rem 1rem;font-size:.9rem;margin-bottom:.75rem;outline:none}
input:focus{border-color:#4f46e5}
.btn{width:100%;padding:.8rem;border:none;border-radius:.75rem;font-size:.9rem;font-weight:700;cursor:pointer}
.btn-indigo{background:#4f46e5;color:white}
.btn-green{background:#10b981;color:white}
.error{background:#fef2f2;color:#dc2626;padding:.6rem;border-radius:.5rem;font-size:.8rem;text-align:center;margin-bottom:.75rem;display:none}
.tabs{display:flex;border-radius:.75rem;overflow:hidden;border:1px solid #e5e7eb;margin-bottom:1.25rem}
.tab{flex:1;padding:.6rem;font-size:.8rem;font-weight:700;border:none;cursor:pointer;background:white;color:#6b7280}
.tab.on{background:#4f46e5;color:white}
.tgl-grp{display:flex;border-radius:.75rem;overflow:hidden;border:1px solid #e5e7eb;margin-bottom:.75rem}
.tgl{flex:1;padding:.55rem;font-size:.8rem;font-weight:700;border:none;cursor:pointer;background:white;color:#6b7280;transition:all .2s}
.tgl.on{background:#4f46e5;color:white}
.tgl.on-blue{background:#3b82f6;color:white}
.tgl.on-pink{background:#ec4899;color:white}
.spin{width:50px;height:50px;border:4px solid #fcd34d;border-top-color:transparent;border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 1rem}
@keyframes sp{to{transform:rotate(360deg)}}
.szbtns{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem}
.szbtn{width:42px;height:42px;border:2px solid #e5e7eb;background:white;border-radius:.75rem;font-weight:700;cursor:pointer;color:#374151;font-size:.9rem}
.szbtn.on{background:#4f46e5;color:white;border-color:#4f46e5}
.card{background:white;border-radius:1.25rem;padding:1.25rem;margin-bottom:1rem;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.row{display:flex;align-items:center;gap:.75rem;padding:.6rem 0;border-bottom:1px solid #f3f4f6}
.row:last-child{border-bottom:none}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:.85rem;flex-shrink:0}
.btn-sm{border:none;padding:.4rem .8rem;border-radius:.5rem;font-size:.75rem;font-weight:700;cursor:pointer}
.btn-approve{background:#10b981;color:white}
.btn-reject{background:#fee2e2;color:#dc2626}
.btn-add{background:#3b82f6;color:white}
.btn-kick{background:#fee2e2;color:#dc2626}
.empty{text-align:center;color:#9ca3af;font-size:.85rem;padding:1.5rem 0}
.match-row{display:flex;align-items:center;gap:.5rem;padding:.55rem 0;border-bottom:1px solid rgba(255,255,255,.15);font-size:.82rem}
.match-row:last-child{border-bottom:none}
.badge{font-size:.68rem;padding:.15rem .45rem;border-radius:9999px;font-weight:700;flex-shrink:0}
</style>
</head>
<body>

<div id="s-home" style="display:none;min-height:100vh;background:linear-gradient(135deg,#3730a3,#7c3aed);align-items:center;justify-content:center;padding:1rem">
  <div style="background:white;border-radius:1.5rem;padding:2rem;width:100%;max-width:360px;box-shadow:0 20px 40px rgba(0,0,0,.3)">
    <div style="text-align:center;font-size:3rem;margin-bottom:.5rem">👥</div>
    <h1 style="text-align:center;font-size:1.5rem;font-weight:800;color:#1f2937;margin-bottom:.25rem">どーなっつチーム分け</h1>
    <p style="text-align:center;font-size:.8rem;color:#6b7280;margin-bottom:1.5rem">チーム分けにつかってね</p>
    <div class="tabs">
      <button class="tab on" data-tab="create" onclick="switchTab(this)">🛡 管理者</button>
      <button class="tab" data-tab="join" onclick="switchTab(this)">➕ 参加者</button>
    </div>
    <div id="h-err" class="error"></div>
    <input id="h-name" type="text" placeholder="あなたの名前"/>
    <p style="font-size:.8rem;color:#6b7280;margin-bottom:.5rem">性別</p>
    <div class="tgl-grp">
      <button class="tgl on-blue" id="g-male" onclick="selectGender('male')">👦 男子</button>
      <button class="tgl" id="g-female" onclick="selectGender('female')">👧 女子</button>
    </div>
    <div id="join-fields" style="display:none;margin-top:.25rem">
      <input id="h-code" type="text" placeholder="ルームコード（例: AB3X）" maxlength="4" style="text-transform:uppercase;text-align:center;letter-spacing:.3em;font-weight:800"/>
    </div>
    <button class="btn btn-indigo" id="h-btn" onclick="homeAction()">ルームを作成する</button>
  </div>
</div>

<div id="s-waiting" style="display:none;min-height:100vh;background:linear-gradient(135deg,#fffbeb,#fef3c7);align-items:center;justify-content:center;padding:1rem">
  <div style="background:white;border-radius:1.5rem;padding:2.5rem 2rem;text-align:center;max-width:320px;width:100%;box-shadow:0 10px 30px rgba(0,0,0,.1)">
    <div class="spin"></div>
    <h2 style="font-size:1.2rem;font-weight:800;color:#1f2937;margin-bottom:.5rem">承認を待っています</h2>
    <p style="font-size:.8rem;color:#6b7280;margin-bottom:1.5rem">管理者が承認するまでお待ちください</p>
    <div style="background:#fffbeb;border:1px solid #fcd34d;border-radius:.75rem;padding:1rem">
      <p style="font-size:.7rem;color:#d97706;font-weight:600;margin-bottom:.25rem">ルームコード</p>
      <p id="w-code" style="font-size:2rem;font-weight:900;color:#b45309;letter-spacing:.3em"></p>
    </div>
    <p style="font-size:.75rem;color:#92400e;margin-top:.75rem">参加名: <strong id="w-name"></strong></p>
    <button onclick="leaveRoom()" style="margin-top:1rem;background:none;border:none;color:#9ca3af;font-size:.8rem;cursor:pointer">🚪 退出する</button>
  </div>
</div>

<div id="s-participant" style="display:none;min-height:100vh;background:#f3f4f6;padding:1rem">
  <div style="max-width:400px;margin:0 auto">
    <div id="p-hero" style="display:none;border-radius:1.5rem;padding:2rem;text-align:center;margin-bottom:1rem">
      <p style="color:rgba(255,255,255,.8);font-size:.75rem;font-weight:600;margin-bottom:.25rem">あなたのチーム</p>
      <p id="p-num" style="font-size:7rem;font-weight:900;color:white;line-height:1"></p>
      <p id="p-label" style="font-size:1.2rem;font-weight:700;color:rgba(255,255,255,.9)"></p>
      <p id="p-court" style="font-size:.85rem;color:rgba(255,255,255,.9);font-weight:700;margin-top:.4rem;background:rgba(0,0,0,.15);display:inline-block;padding:.3rem .8rem;border-radius:999px"></p>
    </div>
    <div id="p-wait" class="card" style="text-align:center;padding:2rem">
      <p style="font-size:2rem;margin-bottom:.5rem">⏳</p>
      <p style="color:#6b7280;font-size:.85rem">管理者がチーム分けを行うまでお待ちください</p>
    </div>
    <div id="p-members-card" class="card" style="display:none">
      <h3 id="p-member-title" style="font-size:.85rem;font-weight:700;color:#374151;margin-bottom:.75rem"></h3>
      <div id="p-members"></div>
    </div>
    <div id="p-schedule-card" class="card" style="display:none">
      <h3 style="font-size:.85rem;font-weight:700;color:#374151;margin-bottom:.75rem">📋 あなたの試合スケジュール</h3>
      <div id="p-schedule"></div>
    </div>
    <div id="p-all-card" class="card" style="display:none">
      <h3 style="font-size:.85rem;font-weight:700;color:#374151;margin-bottom:.75rem">全チーム</h3>
      <div id="p-all"></div>
    </div>
    <button onclick="leaveRoom()" style="width:100%;background:none;border:none;color:#9ca3af;font-size:.8rem;padding:.5rem;cursor:pointer;margin-top:.5rem">🚪 退出する</button>
  </div>
</div>

<div id="s-admin" style="display:none;min-height:100vh;background:#f3f4f6;padding-bottom:2rem">
  <div style="background:#4338ca;color:white;padding:1.25rem 1rem 1.5rem">
    <div style="max-width:500px;margin:0 auto">
      <div style="font-size:.75rem;color:#a5b4fc;margin-bottom:.25rem">管理者パネル</div>
      <div style="display:flex;align-items:center;gap:.75rem">
        <div id="a-code" style="font-size:2.5rem;font-weight:900;letter-spacing:.2em"></div>
        <button onclick="copyCode()" id="copy-btn" style="background:#4f46e5;border:none;color:white;padding:.5rem;border-radius:.5rem;cursor:pointer;font-size:1rem">📋</button>
        <span id="a-badge" style="font-size:.7rem;font-weight:700;padding:.2rem .6rem;border-radius:9999px;background:#4f46e5;margin-left:auto">⏳ 待機中</span>
      </div>
      <div id="a-stats" style="font-size:.75rem;color:#c7d2fe;margin-top:.5rem"></div>
    </div>
  </div>
  <div style="max-width:500px;margin:0 auto;padding:1rem">

    <div id="a-req-sec" class="card" style="display:none">
      <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:1rem;font-size:.85rem;font-weight:700;color:#374151">
        <div style="width:8px;height:8px;border-radius:50%;background:#f59e0b"></div>
        <span id="a-req-title">入室申請</span>
        <button onclick="approveAll()" style="margin-left:auto;background:#10b981;color:white;border:none;padding:.3rem .75rem;border-radius:.5rem;font-size:.75rem;font-weight:700;cursor:pointer">✅ 全員承認</button>
      </div>
      <div id="a-req-list"></div>
    </div>

    <div id="a-setup-sec" class="card">
      <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:1rem;font-size:.85rem;font-weight:700;color:#374151">
        <div style="width:8px;height:8px;border-radius:50%;background:#4f46e5"></div>チーム設定
      </div>
      
      <p style="font-size:.8rem;color:#6b7280;margin-bottom:.4rem">試合モード</p>
      <div class="tgl-grp" style="margin-bottom:1rem">
        <button class="tgl on" id="mode-mixed" onclick="setGameMode('mixed')">🔀 混合</button>
        <button class="tgl" id="mode-sep" onclick="setGameMode('separate')">⚥ 男女別</button>
      </div>

      <p style="font-size:.8rem;color:#6b7280;margin-bottom:.4rem">使用コート数</p>
      <div class="tgl-grp" style="margin-bottom:1rem">
        <button class="tgl" id="court-1" onclick="setCourtNum(1)">1コート（全体）</button>
        <button class="tgl on" id="court-2" onclick="setCourtNum(2)">2コート</button>
      </div>

      <div style="display:flex;border-radius:.75rem;overflow:hidden;border:1px solid #e5e7eb;margin-bottom:1rem">
        <button id="dc-btn" onclick="setDivMode('count')" style="flex:1;padding:.6rem;font-size:.8rem;font-weight:700;border:none;cursor:pointer;background:#4f46e5;color:white">👤 人数で分ける</button>
        <button id="dt-btn" onclick="setDivMode('team')" style="flex:1;padding:.6rem;font-size:.8rem;font-weight:700;border:none;cursor:pointer;background:white;color:#6b7280">🏷 チーム数で分ける</button>
      </div>
      <p id="sz-label" style="font-size:.8rem;color:#6b7280;margin-bottom:.5rem">1チームの人数</p>
      <div class="szbtns" id="sz-btns"></div>
      <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1rem;background:#f8faff;border-radius:.75rem;padding:.75rem 1rem">
        <span style="font-size:.85rem;color:#374151;font-weight:600;flex:1">管理者もチームに参加する</span>
        <div onclick="toggleAdminJoin()" id="toggle-bg" style="position:relative;width:44px;height:24px;background:#4f46e5;border-radius:24px;cursor:pointer;transition:.3s">
          <div id="toggle-knob" style="position:absolute;width:18px;height:18px;background:white;border-radius:50%;top:3px;left:23px;transition:.3s"></div>
        </div>
      </div>
      <div id="a-preview" style="background:#eef2ff;border-radius:.75rem;padding:.75rem 1rem;margin-bottom:1rem;font-size:.85rem;color:#4338ca;font-weight:600"></div>
      <button id="a-shuffle" onclick="doShuffle()" disabled style="width:100%;background:#4f46e5;color:white;border:none;padding:.9rem;border-radius:.75rem;font-size:.9rem;font-weight:700;cursor:pointer;opacity:.4">🔀 ランダムでチーム分けする</button>
    </div>

    <div class="card">
      <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:1rem;font-size:.85rem;font-weight:700;color:#374151">
        <div style="width:8px;height:8px;border-radius:50%;background:#10b981"></div>
        <span id="a-approved-title">承認済み参加者</span>
      </div>
      <div id="a-approved-list"><div class="empty">まだ参加者がいません</div></div>
    </div>

    <div id="a-teams-sec" class="card" style="display:none">
      <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:1rem;font-size:.85rem;font-weight:700;color:#374151">
        <div style="width:8px;height:8px;border-radius:50%;background:#8b5cf6"></div>チーム結果
      </div>
      <div id="a-teams-list"></div>
    </div>

    <div id="a-sched-sec" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem">
        <h3 style="font-size:.9rem;font-weight:800;color:#374151">📋 試合スケジュール</h3>
      </div>
      <div id="a-sched"></div>
    </div>

    <button onclick="exitRoom()" style="width:100%;background:none;border:none;color:#9ca3af;font-size:.8rem;padding:.5rem;cursor:pointer;margin-top:.5rem">🚪 ルームを終了する</button>
  </div>
</div>

<script>
const DB="https://divide-team-default-rtdb.firebaseio.com";
const COLORS=[
  {bg:"#3b82f6",light:"#eff6ff",border:"#bfdbfe",text:"#1d4ed8"},
  {bg:"#ef4444",light:"#fef2f2",border:"#fecaca",text:"#b91c1c"},
  {bg:"#10b981",light:"#ecfdf5",border:"#a7f3d0",text:"#065f46"},
  {bg:"#f59e0b",light:"#fffbeb",border:"#fde68a",text:"#b45309"},
  {bg:"#8b5cf6",light:"#f5f3ff",border:"#ddd6fe",text:"#6d28d9"},
  {bg:"#ec4899",light:"#fdf2f8",border:"#fbcfe8",text:"#9d174d"},
  {bg:"#6366f1",light:"#eef2ff",border:"#c7d2fe",text:"#4338ca"},
  {bg:"#f97316",light:"#fff7ed",border:"#fed7aa",text:"#c2410c"},
  {bg:"#14b8a6",light:"#f0fdfa",border:"#99f6e4",text:"#0f766e"},
  {bg:"#06b6d4",light:"#ecfeff",border:"#a5f3fc",text:"#0e7490"},
];
const genCode=()=>Math.random().toString(36).substring(2,6).toUpperCase();
const genId=()=>Math.random().toString(36).substring(2,10);
const tNum=k=>parseInt(k.replace('team',''))+1;
const tCol=k=>COLORS[parseInt(k.replace('team',''))%COLORS.length];

let myId=localStorage.getItem("myId")||genId();
localStorage.setItem("myId",myId);
let roomCode=localStorage.getItem("roomCode")||"";
let myName=localStorage.getItem("myName")||"";
let myGender=localStorage.getItem("myGender")||"male";
let isAdminSession=localStorage.getItem("isAdmin")==="true";
let pollTimer=null,currentTab="create";

// 設定変数
let adminJoin=true, divMode="count", gameMode="mixed", courtNum=2;

async function dbGet(p){const r=await fetch(`${DB}/${p}.json`);return r.json();}
async function dbSet(p,d){await fetch(`${DB}/${p}.json`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)});}

function show(id){
  ["s-home","s-waiting","s-participant","s-admin"].forEach(s=>document.getElementById(s).style.display="none");
  document.getElementById(id).style.display=(id==="s-home"||id==="s-waiting")?"flex":"block";
}

function switchTab(btn){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));
  btn.classList.add("on");
  currentTab=btn.dataset.tab;
  document.getElementById("join-fields").style.display=currentTab==="join"?"block":"none";
  document.getElementById("h-btn").textContent=currentTab==="create"?"ルームを作成する":"入室申請する";
  document.getElementById("h-btn").className="btn "+(currentTab==="create"?"btn-indigo":"btn-green");
  document.getElementById("h-err").style.display="none";
}

function selectGender(g){
  myGender=g;
  localStorage.setItem("myGender",g);
  document.getElementById("g-male").className="tgl"+(g==="male"?" on-blue on":"");
  document.getElementById("g-female").className="tgl"+(g==="female"?" on-pink on":"");
}
selectGender(myGender);

function showErr(msg){const e=document.getElementById("h-err");e.textContent=msg;e.style.display=msg?"block":"none";}

async function homeAction(){
  const name=document.getElementById("h-name").value.trim();
  showErr("");
  if(!name)return showErr("名前を入力してください");
  myName=name;localStorage.setItem("myName",name);
  if(currentTab==="create"){
    const code=genCode();
    await dbSet(`rooms/${code}`,{
      adminId:myId, adminName:name, teamSize:5, 
      gameMode:"mixed", courtNum:2, divMode:"count", adminJoin:true,
      participants:{}, teams:{}, gameStarted:false
    });
    roomCode=code;
    localStorage.setItem("roomCode",code);localStorage.setItem("isAdmin","true");
    isAdminSession=true;startAdminPoll();show("s-admin");
  } else {
    const code=document.getElementById("h-code").value.trim().toUpperCase();
    if(code.length!==4)return showErr("ルームコードは4文字です");
    const room=await dbGet(`rooms/${code}`);
    if(!room)return showErr("ルームが見つかりません");
    await dbSet(`rooms/${code}/participants/${myId}`,{id:myId,name,status:"waiting",gender:myGender,joinedAt:Date.now()});
    roomCode=code;
    localStorage.setItem("roomCode",code);localStorage.setItem("isAdmin","false");
    isAdminSession=false;
    document.getElementById("w-code").textContent=code;
    document.getElementById("w-name").textContent=name;
    show("s-waiting");startWaitingPoll();
  }
}

function startPoll(fn){stopPoll();fn();pollTimer=setInterval(fn,1500);}
function stopPoll(){if(pollTimer){clearInterval(pollTimer);pollTimer=null;}}

function startWaitingPoll(){
  startPoll(async()=>{
    const me=await dbGet(`rooms/${roomCode}/participants/${myId}`);
    if(!me)return;
    if(me.status==="approved"){stopPoll();const room=await dbGet(`rooms/${roomCode}`);renderParticipant(room);show("s-participant");startParticipantPoll();}
    if(me.status==="kicked"){stopPoll();clearLocal();show("s-home");showErr("管理者により退出させられました");}
  });
}

function renderParticipant(room){
  const teams=room.teams||{};
  const teamKeys=Object.keys(teams);
  const myKey=teamKeys.find(k=>teams[k].members&&Object.values(teams[k].members).some(m=>m.id===myId));

  if(myKey&&room.gameStarted){
    const myTeam=teams[myKey];
    const c=tCol(myKey);
    const hero=document.getElementById("p-hero");
    hero.style.display="block";hero.style.background=c.bg;
    document.getElementById("p-num").textContent=tNum(myKey);
    document.getElementById("p-label").textContent=`チーム ${tNum(myKey)}`;
    document.getElementById("p-wait").style.display="none";

    // 自分の試合をすべて抽出して時系列に並べる
    let myMatches = [];
    const currentCourtNum = room.courtNum || 2;
    if(room.schedule){
      if(room.schedule.court1?.matches){
        room.schedule.court1.matches.forEach(m => myMatches.push({...m, courtName: currentCourtNum===1?'コート':'コート1'}));
      }
      if(room.schedule.court2?.matches){
        room.schedule.court2.matches.forEach(m => myMatches.push({...m, courtName: 'コート2'}));
      }
    }
    // 自分が出場、または審判をする試合だけに絞り込む
    myMatches = myMatches.filter(m => m.t1 === myKey || m.t2 === myKey || m.ref === myKey);
    myMatches.sort((a,b) => a.num - b.num);

    document.getElementById("p-court").textContent = myMatches.length > 0 ? `📍 全 ${myMatches.length} 試合（スケジュールを確認）` : "";
    
    const mems=Object.values(myTeam.members||{});
    document.getElementById("p-member-title").textContent=`あなたのチームメンバー（${mems.length}人）`;
    document.getElementById("p-members").innerHTML=mems.map(m=>`
      <div class="row">
        <div class="av" style="background:${c.bg}">${m.name[0]}</div>
        <span style="flex:1;font-size:.9rem;color:#1f2937">${m.name}</span>
        <span style="font-size:.75rem">${m.gender==='male'?'👦':'👧'}</span>
        ${m.id===myId?'<span style="font-size:.7rem;background:#d1fae5;color:#065f46;padding:.2rem .5rem;border-radius:9999px">あなた</span>':""}
      </div>`).join("");
    document.getElementById("p-members-card").style.display="block";

    // スケジュール表示（コート名バッジ付き）
    if(myMatches.length > 0){
      document.getElementById("p-schedule").innerHTML = renderMatches(myMatches, myKey);
      document.getElementById("p-schedule-card").style.display="block";
    } else {
      document.getElementById("p-schedule-card").style.display="none";
    }

    document.getElementById("p-all").innerHTML=teamKeys.map(k=>{
      const t=teams[k];const col=tCol(k);const ms=Object.values(t.members||{});
      return `<div style="margin-bottom:.75rem">
        <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem">

async function doShuffle(){
  const room=await dbGet(`rooms/${roomCode}`);
  const base=Object.values(room.participants||{}).filter(p=>p.status==="approved");
  const adminM={id:myId,name:myName,status:"approved",gender:myGender};
  const all=adminJoin?[adminM,...base]:base;
  if(all.length<2)return;
  const sz=room.teamSize||5;
  let teams={},ti=0;

  if(gameMode==="separate"){
    const males=[...all.filter(p=>p.gender==='male')].sort(()=>Math.random()-.5);
    const females=[...all.filter(p=>p.gender==='female')].sort(()=>Math.random()-.5);
    if(divMode==="count"){
      for(let i=0;i<males.length;i+=sz){const chunk=males.slice(i,i+sz);const mem={};chunk.forEach(m=>mem[m.id]=m);teams[`team${ti}`]={id:`team${ti}`,members:mem,gender:'male'};ti++;}
      for(let i=0;i<females.length;i+=sz){const chunk=females.slice(i,i+sz);const mem={};chunk.forEach(m=>mem[m.id]=m);teams[`team${ti}`]={id:`team${ti}`,members:mem,gender:'female'};ti++;}
    } else {
      const mT=Math.max(1,Math.round(sz*males.length/Math.max(all.length,1)));
      const fT=Math.max(females.length>0?1:0,sz-mT);
      const mShuf=[...males].sort(()=>Math.random()-.5);
      for(let i=0;i<mT;i++){teams[`team${ti}`]={id:`team${ti}`,members:{},gender:'male'};ti++;}
      mShuf.forEach((m,i)=>{const k=`team${i%mT}`;teams[k].members[m.id]=m;});
      if(fT>0){
        const fStart=ti;const fShuf=[...females].sort(()=>Math.random()-.5);
        for(let i=0;i<fT;i++){teams[`team${ti}`]={id:`team${ti}`,members:{},gender:'female'};ti++;}
        fShuf.forEach((m,i)=>{const k=`team${fStart+i%fT}`;teams[k].members[m.id]=m;});
      }
    }
  } else {
    // 混合モード
    const males=[...all.filter(p=>p.gender==='male')].sort(()=>Math.random()-.5);
    const females=[...all.filter(p=>p.gender==='female')].sort(()=>Math.random()-.5);
    const tCount=divMode==="count"?Math.ceil(all.length/sz):sz;
    const actualTC=Math.max(1,tCount);
    for(let i=0;i<actualTC;i++){teams[`team${i}`]={id:`team${i}`,members:{},gender:'mixed'};}
    
    males.forEach((m,i)=>{teams[`team${i%actualTC}`].members[m.id]=m;});
    const offset=males.length;
    females.forEach((m,i)=>{teams[`team${(i+offset)%actualTC}`].members[m.id]=m;});
  }

  const schedule=buildCourts(teams);
  await dbSet(`rooms/${roomCode}/teams`,teams);
  await dbSet(`rooms/${roomCode}/gameStarted`,true);
  await dbSet(`rooms/${roomCode}/schedule`,schedule);
}

function buildCourts(teams){

  const keys = Object.keys(teams);

  // =========================
  // ラウンドロビン生成
  // =========================

  function createRoundRobin(teamKeys){

    if(teamKeys.length <= 1){
      return [];
    }

    let rotation = [...teamKeys];

    const isOdd = rotation.length % 2 === 1;

    if(isOdd){
      rotation.push("BYE");
    }

    const rounds = rotation.length - 1;
    const half = rotation.length / 2;

    const result = [];

    for(let round = 0; round < rounds; round++){

      let matches = [];

      for(let i = 0; i < half; i++){

        const t1 = rotation[i];
        const t2 = rotation[rotation.length - 1 - i];

        if(t1 === "BYE" || t2 === "BYE"){
          continue;
        }

        matches.push({
          t1,
          t2,
          round: round + 1
        });
      }

      result.push({
        matches,
        round: round + 1
      });

      const fixed = rotation[0];

      const rest = rotation.slice(1);

      rest.unshift(rest.pop());

      rotation = [fixed, ...rest];
    }

    return result;
  }

  // =========================
  // 男女別対応
  // =========================

  let allSlots = [];

  if(gameMode === "separate"){

    const maleKeys = keys.filter(
      k => teams[k].gender === "male"
    );

    const femaleKeys = keys.filter(
      k => teams[k].gender === "female"
    );

    const maleSlots = createRoundRobin(maleKeys);
    const femaleSlots = createRoundRobin(femaleKeys);

    const maxRounds = Math.max(
      maleSlots.length,
      femaleSlots.length
    );

    for(let i = 0; i < maxRounds; i++){

      if(maleSlots[i]){
        allSlots.push({
          ...maleSlots[i],
          gender: "male"
        });
      }

      if(femaleSlots[i]){
        allSlots.push({
          ...femaleSlots[i],
          gender: "female"
        });
      }
    }

  }else{

    allSlots = createRoundRobin(keys);
  }

  // =========================
  // 審判回数均等化
  // =========================

  const refCount = {};

  keys.forEach(k=>{
    refCount[k] = 0;
  });

  allSlots.forEach(slot=>{

    const playingTeams = new Set();

    slot.matches.forEach(m=>{
      playingTeams.add(m.t1);
      playingTeams.add(m.t2);
    });

    let candidates = keys.filter(
      k => !playingTeams.has(k)
    );

    if(gameMode === "separate" && slot.gender){

      const genderCandidates = candidates.filter(
        k => teams[k].gender === slot.gender
      );

      if(genderCandidates.length > 0){
        candidates = genderCandidates;
      }
    }

    candidates.sort((a,b)=>{

      if(refCount[a] !== refCount[b]){
        return refCount[a] - refCount[b];
      }

      return Math.random() - 0.5;
    });

    slot.ref = candidates[0] || null;

    if(slot.ref){
      refCount[slot.ref]++;
    }
  });

  // =========================
  // コート割り当て
  // =========================

  let court1 = [];
  let court2 = [];

  let court1Num = 1;
  let court2Num = 1;

  allSlots.forEach(slot => {

    slot.matches.forEach((match) => {

      const obj = {
        ...match,
        ref: slot.ref || null,
        round: slot.round
      };

      if(courtNum === 1){

        obj.displayNum = `${court1Num}`;

        court1.push(obj);

        court1Num++;

      }else{

        // 全体で交互に振り分け
        if((court1.length + court2.length) % 2 === 0){

          obj.displayNum = `${court1Num}`;

          court1.push(obj);

          court1Num++;

        }else{

          obj.displayNum = `${court2Num}'`;

          court2.push(obj);

          court2Num++;
        }
      }
    });
  });

  return {
    court1:{
      teamKeys: keys,
      matches: court1
    },
    court2: courtNum === 2 ? {
      teamKeys: keys,
      matches: court2
    } : null
  };
}

async function addLate(id){

  const room = await dbGet(`rooms/${roomCode}`);

  const participant = room.participants[id];

  if(!participant) return;

  const teams = room.teams || {};

  const entries = Object.entries(teams);

  if(entries.length === 0) return;

  let candidates = entries;

  if(room.gameMode === "separate"){

    candidates = entries.filter(([k,t])=>{
      return t.gender === participant.gender;
    });
  }

  if(candidates.length === 0){

    alert("追加できるチームがありません");

    return;
  }

  candidates.sort((a,b)=>{

    const aCount = Object.keys(a[1].members || {}).length;
    const bCount = Object.keys(b[1].members || {}).length;

    return aCount - bCount;
  });

  const [targetKey,targetTeam] = candidates[0];

  const updatedMembers = {
    ...(targetTeam.members || {}),
    [participant.id]: {
      ...participant,
      lateJoin: true
    }
  };

  await dbSet(
    `rooms/${roomCode}/teams/${targetKey}/members`,
    updatedMembers
  );

  await dbSet(
    `rooms/${roomCode}/participants/${id}/status`,
    "approved"
  );

  alert(`チーム ${tNum(targetKey)} に追加しました`);
}

async function init(){
  if(!roomCode){show("s-home");return;}
  const room=await dbGet(`rooms/${roomCode}`);
  if(!room){clearLocal();show("s-home");return;}
  if(isAdminSession){startAdminPoll();show("s-admin");}
  else{
    const me=room.participants?.[myId];
    if(!me){clearLocal();show("s-home");return;}
    if(me.status==="approved"){renderParticipant(room);show("s-participant");startParticipantPoll();}
    else if(me.status==="waiting"){
      document.getElementById("w-code").textContent=roomCode;
      document.getElementById("w-name").textContent=myName;
      show("s-waiting");startWaitingPoll();
    } else {clearLocal();show("s-home");}
  }
}
init();
</script>
