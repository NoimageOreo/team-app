<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>チーム分けアプリ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- HOME -->
<div id="home" class="screen">
  <div style="min-height:100vh;background:linear-gradient(135deg,#3730a3,#7c3aed);display:flex;align-items:center;justify-content:center;padding:1rem">
    <div class="home-card">
      <div class="home-icon">👥</div>
      <h1 class="home-title">チーム分けアプリ</h1>
      <p class="home-sub">サークル・イベントのチーム編成ツール</p>
      <div class="tabs">
        <button class="tab-btn active" data-tab="create">🛡 管理者</button>
        <button class="tab-btn" data-tab="join">➕ 参加者</button>
      </div>
      <div id="home-error" class="error-msg" style="display:none"></div>
      <input id="input-name" type="text" placeholder="あなたの名前" />
      <div id="join-fields" style="display:none">
        <input id="input-code" type="text" class="code-input" placeholder="ルームコード（例: AB3X）" maxlength="4" />
      </div>
      <button id="home-btn" class="btn btn-primary">ルームを作成する</button>
    </div>
  </div>
</div>

<!-- WAITING -->
<div id="waiting" class="screen">
  <div style="min-height:100vh;background:linear-gradient(135deg,#fffbeb,#fef3c7);display:flex;align-items:center;justify-content:center;padding:1rem">
    <div class="waiting-card">
      <div class="spinner"></div>
      <h2>承認を待っています</h2>
      <p>管理者が承認するまでしばらくお待ちください</p>
      <div class="code-badge">
        <small>ルームコード</small>
        <div class="big-code" id="waiting-code"></div>
      </div>
      <p style="font-size:0.75rem;color:#92400e;margin-top:0.75rem">参加名: <strong id="waiting-name"></strong></p>
    </div>
  </div>
</div>

<!-- PARTICIPANT -->
<div id="participant" class="screen">
  <div style="min-height:100vh;background:#f3f4f6;padding:1rem">
    <div class="p-inner">
      <div id="p-team-hero" class="team-hero" style="display:none">
        <small>あなたのチーム</small>
        <div class="team-number" id="p-team-number"></div>
        <div class="team-label" id="p-team-label"></div>
      </div>
      <div id="p-waiting-notice" class="waiting-notice">
        <div class="icon">⏳</div>
        <p>管理者がチーム分けを行うまでお待ちください</p>
      </div>
      <div class="card" id="p-members-card" style="display:none">
        <h3 id="p-member-count">あなたのチームメンバー</h3>
        <div id="p-members"></div>
      </div>
      <div class="card" id="p-all-card" style="display:none">
        <h3>全チーム</h3>
        <div id="p-all-teams"></div>
      </div>
    </div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="screen">
  <div class="admin-header">
    <div class="admin-header-inner">
      <div class="admin-meta">管理者パネル</div>
      <div class="admin-code-row">
        <div class="admin-code" id="admin-code-display"></div>
        <button class="copy-btn" id="copy-btn">📋</button>
        <span class="status-badge status-wait" id="admin-status-badge">⏳ 待機中</span>
      </div>
      <div class="admin-stats" id="admin-stats"></div>
    </div>
  </div>
  <div class="admin-body">
    <div id="error-box" class="error-box" style="display:none"></div>

    <!-- 申請 -->
    <div class="section" id="req-section" style="display:none">
      <div class="section-header"><div class="dot dot-yellow"></div><span id="req-count">入室申請</span></div>
      <div id="req-list"></div>
    </div>

    <!-- チーム設定 -->
    <div class="section" id="setup-section">
      <div class="section-header"><div class="dot" style="background:#4f46e5"></div>チーム設定</div>
      <p style="font-size:0.8rem;color:#6b7280;margin-bottom:0.5rem">1チームの人数</p>
      <div class="size-btns">
        <button class="size-btn" id="sz-2">2</button>
        <button class="size-btn" id="sz-3">3</button>
        <button class="size-btn" id="sz-4">4</button>
        <button class="size-btn active" id="sz-5">5</button>
        <button class="size-btn" id="sz-6">6</button>
        <button class="size-btn" id="sz-7">7</button>
        <button class="size-btn" id="sz-8">8</button>
        <button class="size-btn" id="sz-10">10</button>
      </div>
      <div class="preview-box" id="preview-text"></div>
      <button class="btn-shuffle" id="shuffle-btn" disabled>🔀 ランダムでチーム分けする</button>
    </div>

    <!-- 承認済み -->
    <div class="section">
      <div class="section-header"><div class="dot dot-green"></div><span id="approved-count">承認済み参加者</span></div>
      <div id="approved-list"><div class="empty-msg">まだ参加者がいません</div></div>
    </div>

    <!-- チーム結果 -->
    <div class="section" id="teams-section" style="display:none">
      <div class="section-header">
        <div class="dot dot-purple"></div>チーム結果
        <button class="reshuffle-btn" id="reshuffle-btn">🔀 再シャッフル</button>
      </div>
      <div id="teams-list"></div>
    </div>

    <button class="btn-exit" id="exit-btn">🚪 ルームを終了する</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
