<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>どーなっつ チーム分けアプリ</title>
<meta property="og:title" content="どーなっつ チーム分けアプリ" />
<meta property="og:description" content="どーなっつ専用チーム分け" />
<meta property="og:type" content="website" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f3f4f6;min-height:100vh}
input{width:100%;border:2px solid #e5e7eb;border-radius:.75rem;padding:.75rem 1rem;font-size:.9rem;margin-bottom:.75rem;outline:none}
input:focus{border-color:#4f46e5}
.btn{width:100%;padding:.8rem;border:none;border-radius:.75rem;font-size:.9rem;font-weight:700;cursor:pointer}
.btn-indigo{background:#4f46e5;color:white}
.btn-green{background:#10b981;color:white}
.error{background:#fef2f2;color:#dc2626;padding:.6rem;border-radius:.5rem;font-size:.8rem;text-align:center;margin-bottom:.75rem;display:none}
.tabs{display:flex;border-radius:.75rem;overflow:hidden;border:1px solid #e5e7eb;margin-bottom:1.25rem}
.tab{flex:1;padding:.6rem;font-size:.8rem;font-weight:700;border:none;cursor:pointer;background:white;color:#6b7280}
.tab.on{background:#4f46e5;color:white}
.tgl-grp{display:flex;border-radius:.75rem;overflow:hidden;border:1px solid #e5e7eb;margin-bottom:.75rem}
.tgl{flex:1;padding:.55rem;font-size:.8rem;font-weight:700;border:none;cursor:pointer;background:white;color:#6b7280;transition:all .2s}
.tgl.on{background:#4f46e5;color:white}
.tgl.on-blue{background:#3b82f6;color:white}
.tgl.on-pink{background:#ec4899;color:white}
.spin{width:50px;height:50px;border:4px solid #fcd34d;border-top-color:transparent;border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 1rem}
@keyframes sp{to{transform:rotate(360deg)}}
.szbtns{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem}
.szbtn{width:42px;height:42px;border:2px solid #e5e7eb;background:white;border-radius:.75rem;font-weight:700;cursor:pointer;color:#374151;font-size:.9rem}
.szbtn.on{background:#4f46e5;color:white;border-color:#4f46e5}
.card{background:white;border-radius:1.25rem;padding:1.25rem;margin-bottom:1rem;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.row{display:flex;align-items:center;gap:.75rem;padding:.6rem 0;border-bottom:1px solid #f3f4f6}
.match-row{display:block; padding:.55rem 0; border-bottom:1px solid rgba(0,0,0,.05); font-size:.82rem;}
.timer-box { background: #1f2937; border-radius: 1rem; padding: 1.25rem; text-align: center; margin-bottom: 1rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,.3); }
.timer-time { font-size: 3.5rem; font-weight: 900; color: white; font-variant-numeric: tabular-nums; line-height: 1; margin: .5rem 0; letter-spacing: 2px;}
.timer-ctrls { display: flex; gap: 0.5rem; justify-content: center; margin-top: 1rem; }
.t-btn { flex:1; background: #374151; color: white; border: none; padding: .6rem; border-radius: .5rem; font-weight: 700; cursor: pointer; }
.t-btn.primary { background: #10b981; }
.t-btn.warning { background: #f59e0b; color: #fff;}
</style>
</head>
<body>

<div id="s-home" style="display:flex;min-height:100vh;background:linear-gradient(135deg,#3730a3,#7c3aed);align-items:center;justify-content:center;padding:1rem">
  <div style="background:white;border-radius:1.5rem;padding:2rem;width:100%;max-width:360px;box-shadow:0 20px 40px rgba(0,0,0,.3)">
    <h1 style="text-align:center;font-size:1.5rem;font-weight:800;margin-bottom:1.5rem">どーなっつ チーム分け</h1>
    <input id="h-name" type="text" placeholder="あなたの名前"/>
    <button class="btn btn-indigo" onclick="createRoom()">ルーム作成</button>
  </div>
</div>

<div id="s-main" style="display:none;min-height:100vh;background:#f3f4f6;padding:1rem">
  <div style="max-width:500px;margin:0 auto">
    <div id="timer-sec" class="timer-box" style="display:none;">
      <div id="timer-display" class="timer-time">05:00</div>
      <div class="timer-ctrls">
        <button class="t-btn" onclick="startTimer(300)">5分</button>
        <button id="btn-timer" class="t-btn primary" onclick="toggleTimer()">スタート</button>
      </div>
    </div>
    <div id="a-setup" class="card">
        <button class="btn btn-indigo" onclick="doShuffle()">🔀 チーム分け＆試合作成</button>
    </div>
    <div id="a-sched" class="card" style="display:none"></div>
  </div>
</div>

<script>
const DB="https://divide-team-default-rtdb.firebaseio.com";
let roomCode = "TEST"; // 簡単のため固定

async function dbSet(p,d){await fetch(`${DB}/${p}.json`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)});}
async function dbGet(p){const r=await fetch(`${DB}/${p}.json`);return r.json();}

function createRoom(){
    document.getElementById("s-home").style.display="none";
    document.getElementById("s-main").style.display="block";
    document.getElementById("timer-sec").style.display="block";
}

// 完璧なスケジュール作成ロジック（スロット方式）
function buildSchedule(teams, courtNum) {
    const keys = Object.keys(teams);
    let allMatches = [];
    
    // ラウンドロビン（総当たり）作成
    let t = [...keys];
    if (t.length % 2 !== 0) t.push(null);
    for(let r=0; r<t.length-1; r++){
        for(let i=0; i<t.length/2; i++){
            if(t[i] && t[t.length-1-i]) allMatches.push({t1:t[i], t2:t[t.length-1-i]});
        }
        t.splice(1, 0, t.pop());
    }

    // スロット詰め込み（重複なし）
    let slots = [];
    let remaining = [...allMatches];
    while(remaining.length > 0){
        let slot = [];
        let busy = new Set();
        for(let i=0; i<remaining.length && slot.length < courtNum; i++){
            if(!busy.has(remaining[i].t1) && !busy.has(remaining[i].t2)){
                let m = remaining.splice(i,1)[0];
                slot.push(m); busy.add(m.t1); busy.add(m.t2); i--;
            }
        }
        slots.push(slot);
    }

    // コート振り分けと連番
    let c1=[], c2=[];
    let c1N=1, c2N=1;
    slots.forEach(slot => {
        slot.forEach((m, i) => {
            if(i==0) { m.num=c1N++; c1.push(m); }
            else { m.num=c2N++; c2.push(m); }
        });
    });
    return { court1: {matches: c1}, court2: {matches: c2} };
}

function doShuffle(){
    // ダミーのチームデータ
    let teams = { team0:{members:{},gender:'mixed'}, team1:{members:{},gender:'mixed'}, team2:{members:{},gender:'mixed'}, team3:{members:{},gender:'mixed'} };
    let sched = buildSchedule(teams, 2);
    
    let html = "<h3>📋 試合スケジュール</h3>";
    ["court1", "court2"].forEach(c => {
        html += `<h4>🏟 ${c}</h4>`;
        sched[c].matches.forEach(m => {
            html += `<div class="match-row">第${m.num}試合: チーム${parseInt(m.t1.replace('team',''))+1} vs チーム${parseInt(m.t2.replace('team',''))+1}</div>`;
        });
    });
    document.getElementById("a-sched").style.display="block";
    document.getElementById("a-sched").innerHTML=html;
}

// タイマー機能
let timer = { endTime: null, isRunning: false };
function startTimer(sec){ timer.endTime = Date.now() + sec*1000; timer.isRunning = true; }
function toggleTimer(){ timer.isRunning = !timer.isRunning; }
setInterval(() => {
    if(timer.isRunning && timer.endTime){
        let left = Math.max(0, timer.endTime - Date.now());
        document.getElementById("timer-display").textContent = new Date(left).toISOString().substr(14,5);
    }
}, 1000);
</script>
</body>
</html>
